name: Compile Ink Stories

on:
  push:
    paths:
      - "source/**/*.ink"
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download inklecate
        run: |
          curl -sL https://github.com/inkle/ink/releases/latest/download/inklecate_linux.zip -o inklecate.zip
          unzip inklecate.zip
          chmod +x inklecate
          echo "inklecate ready"

      - name: Compile all .ink files
        run: |
          mkdir -p stories
          find source -name "*.ink" | while read src; do
            dir=$(dirname "$src")
            id=$(basename "$dir")
            mkdir -p "stories/$id"
            echo "Compile $src -> stories/$id/story.ink.json"
            ./inklecate -o "stories/$id/story.ink.json" "$src"
          done

      - name: Validate output
        run: |
          echo "Compiled:"
          find stories -name "*.ink.json" -exec echo "  {}" \;

      - name: Commit compiled output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto: compile ink stories"
            git push
          fi
